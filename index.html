<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>

    <link rel="stylesheet" href="style.css" />

    <!-- Font Awesome Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
  </head>
  <body>
    <div class="container">
      <!-- HEADER -->
      <header>
        <div class="logo">
          <h1>🌤 Weather App</h1>
        </div>
      </header>

      <!-- MAIN CARD -->
      <div class="weather-card">
        <!-- SEARCH BAR -->
        <div class="search-wrapper">
          <form id="weatherForm" class="search-bar">
            <input
              type="text"
              id="cityInput"
              placeholder="Enter city name"
              required
            />

            <button type="submit">Search</button>
          </form>
        </div>

        <!-- LOADING & ERROR -->
        <p id="loadingMessage"></p>
        <p id="errorMessage"></p>

        <!-- HERO SECTION -->
        <section class="hero">
          <div id="weatherIcon">
            <i class="fas fa-sun"></i>
          </div>

          <h2 id="cityName">Lagos, Nigeria</h2>

          <h1 id="temperature">32°C</h1>

          <p id="weatherDescription">Sunny • Feels like 36°C</p>
        </section>

        <!-- STATS -->
        <section class="stats">
          <div class="stat">
            <h3>Humidity</h3>
            <p id="humidity">78%</p>
          </div>

          <div class="stat">
            <h3>Wind</h3>
            <p id="windSpeed">14 km/h</p>
          </div>

          <div class="stat">
            <h3>UV Index</h3>
            <p id="uvIndex">High</p>
          </div>
        </section>

        <!-- FORECAST -->
        <section class="forecast">
          <h2>5-Day Forecast</h2>

          <div id="forecastContainer">
            <!-- Dynamic Forecast Cards Inserted Here -->
          </div>
        </section>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
